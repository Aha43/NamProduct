name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages here serves the `gh-pages` BRANCH (Pages build_type: legacy), so we publish by
# pushing the built site to that branch — the artifact/`deploy-pages` method would not be
# served. JamesIves needs write access to push the branch.
permissions:
  contents: write

# Don't let a deploy and a PR-preview clobber each other on the gh-pages branch.
concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          # Wipe stale site files, but keep the sibling preview/screenshot dirs that live
          # on the branch alongside the published site.
          clean: true
          clean-exclude: |
            pr-preview
            prerelease
            shots
