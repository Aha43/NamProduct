name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publish the production build to the `gh-pages` branch root. Previews from
# pr-preview.yml live in pr-preview/ on the same branch, so the deploy preserves
# that directory (clean-exclude) instead of wiping it.
permissions:
  contents: write

# One production deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          clean-exclude: |
            pr-preview/
          # Commit without force-pushing — a force-push overwrites the whole branch
          # (including pr-preview/), defeating clean-exclude and wiping open previews.
          force: false
